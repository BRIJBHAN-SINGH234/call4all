<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Property Manager | Call4All Admin</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/properties.css"></head><body style="background:#f3f6f4"><header class="pa-top"><div><strong>🏠 Property Manager</strong><div style="font-size:12px;opacity:.75">Kukas 10 KM Map</div></div><div><a class="btn btn-outline btn-sm" href="properties.html" target="_blank" style="color:#fff;border-color:#fff">View Map</a> <a class="btn btn-outline btn-sm" href="admin.html" style="color:#fff;border-color:#fff">Admin</a></div></header><main class="pa-wrap"><div class="pa-grid"><section class="pa-card"><h2 id="formTitle">Add Property</h2><p style="color:#66736d">Coordinates enter karein. Image optional hai.</p><form class="pa-form" id="propertyForm"><input type="hidden" name="id"><input type="hidden" name="timestamp"><input type="hidden" name="image_path"><label>Property title *</label><input name="title" required placeholder="e.g. 2BHK Flat near Kukas"><div class="pa-row"><div><label>Latitude *</label><input name="latitude" required type="number" step="any" placeholder="27.0306"></div><div><label>Longitude *</label><input name="longitude" required type="number" step="any" placeholder="75.8966"></div></div><label>Price (₹) *</label><input name="price" required type="number" min="0" placeholder="15000"><div class="pa-row"><div><label>Width (feet) *</label><input name="width_ft" required type="number" min="0" step="any"></div><div><label>Height / Length (feet) *</label><input name="height_ft" required type="number" min="0" step="any"></div></div><label>Property image</label><input id="propertyImage" type="file" accept="image/png,image/jpeg,image/webp"><label>Description</label><textarea name="description" rows="4" placeholder="Property ki complete details…"></textarea><label>Status</label><select name="status"><option>Active</option><option>Inactive</option></select><div id="saveStatus" style="margin-top:10px"></div><div class="pa-actions"><button class="pa-btn gold" type="submit">Save Property</button><button class="pa-btn" id="cancelEdit" type="button" hidden>Cancel</button></div></form></section><section class="pa-card"><h2>Saved Properties</h2><div id="propertyList"><p>Loading…</p></div></section></div></main><script src="assets/js/site.js"></script><script src="assets/js/booking.js"></script><script src="assets/js/property-admin.js"></script></body></html>
