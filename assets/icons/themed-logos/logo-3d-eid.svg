<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Call4All eid logo">
  <title>Call4All eid</title>
  <defs>
    <linearGradient id="ringG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde082"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6f1c"/>
    </linearGradient>
    <linearGradient id="cG" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="45%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="fourG" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="ringShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer 3D ring: thick gradient stroke + 2 hairlines for bevel -->
  <g filter="url(#ringShadow)">
    <circle cx="100" cy="100" r="89" fill="none" stroke="url(#ringG)" stroke-width="9"/>
    <circle cx="100" cy="100" r="93.5" fill="none" stroke="#8b6f1c" stroke-width="0.6" opacity="0.55"/>
    <circle cx="100" cy="100" r="84.5" fill="none" stroke="#8b6f1c" stroke-width="0.6" opacity="0.55"/>
    <circle cx="100" cy="100" r="93.5" fill="none" stroke="#fde082" stroke-width="0.5" opacity="0.45" transform="translate(0,-0.6)"/>
  </g>

  <!-- Big serif C, slightly left of centre, large enough to dominate the ring -->
  <g filter="url(#emboss)">
    <text x="74" y="155"
          font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif"
          font-weight="700" font-size="195"
          fill="url(#cG)"
          text-anchor="middle">C</text>
  </g>

  <!-- Serif 4 nested in the C's opening -->
  <g filter="url(#emboss)">
    <text x="125" y="143"
          font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif"
          font-weight="700" font-size="118"
          fill="url(#fourG)"
          text-anchor="middle">4</text>
  </g>
</svg>
