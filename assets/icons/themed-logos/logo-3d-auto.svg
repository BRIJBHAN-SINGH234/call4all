<?xml version="1.0" encoding="UTF-8"?>
<!--
  Call4All - 3D auto-themed logo.
  Uses currentColor + CSS variables so it follows the active brand theme.
  IMPORTANT: This SVG only fully themes when *inlined* into the document
  (not when loaded via <img src="">). The site renders it inline via
  the renderAutoLogoSvg() helper in site.js when logo_url === 'auto-3d'.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Call4All Logo" class="c4a-auto-logo">
  <style>
    .c4a-auto-logo { color: var(--accent, #c9a36a); }
    .c4a-auto-bg     { fill: #ffffff; }
    .c4a-auto-rim    { stroke: var(--accent, #c9a36a); }
    .c4a-auto-rim-d  { stroke: var(--accent-dark, #a17f47); }
    .c4a-auto-letter { fill: var(--accent-dark, #a17f47); }
    .c4a-auto-shine  { stroke: #ffffff; opacity: .55; }
  </style>
  <defs>
    <radialGradient id="c4a_bg" cx="38%" cy="32%" r="78%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f3ec"/>
    </radialGradient>
    <linearGradient id="c4a_ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="currentColor"/>
      <stop offset="70%"  stop-color="currentColor"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="c4a_letters" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="30%"  stop-color="currentColor"/>
      <stop offset="70%"  stop-color="currentColor"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="c4a_drop" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c4a_emboss" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="1.2" dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#c4a_drop)">
    <circle cx="120" cy="120" r="116" fill="url(#c4a_bg)"/>
    <circle cx="120" cy="120" r="106" fill="none" stroke="url(#c4a_ring)" stroke-width="9"/>
    <circle cx="120" cy="120" r="100.5" fill="none" class="c4a-auto-rim-d" stroke-width="0.6" opacity="0.35"/>
    <circle cx="120" cy="120" r="111.5" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.7"/>
  </g>
  <g filter="url(#c4a_emboss)" color="currentColor">
    <text x="120" y="170" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="160" font-weight="700" text-anchor="middle"
          fill="url(#c4a_letters)" letter-spacing="-6">C4</text>
  </g>
  <path d="M 60 50 A 75 75 0 0 1 175 45" class="c4a-auto-shine" stroke-width="3.5"
        fill="none" stroke-linecap="round"/>
</svg>
