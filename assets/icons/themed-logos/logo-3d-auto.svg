<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Call4All auto-themed logo" class="c4a-auto-logo-svg">
  <title>Call4All</title>
  <defs>
    <linearGradient id="ringGAuto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="var(--accent, #f0d99b)" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="var(--accent, #c9a36a)"/>
      <stop offset="100%" stop-color="var(--accent-dark, #7a5e2e)"/>
    </linearGradient>
    <linearGradient id="cGAuto" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="var(--accent, #f0d99b)" stop-opacity="0.85"/>
      <stop offset="45%"  stop-color="var(--accent, #c9a36a)"/>
      <stop offset="100%" stop-color="var(--accent-dark, #7a5e2e)"/>
    </linearGradient>
    <linearGradient id="fourGAuto" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="var(--accent, #f0d99b)" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="var(--accent, #c9a36a)"/>
      <stop offset="100%" stop-color="var(--accent-dark, #7a5e2e)"/>
    </linearGradient>
    <filter id="embossAuto" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#embossAuto)">
    <circle cx="100" cy="100" r="89" fill="none" stroke="url(#ringGAuto)" stroke-width="9"/>
    <circle cx="100" cy="100" r="93.5" fill="none" stroke="var(--accent-dark, #7a5e2e)" stroke-width="0.6" opacity="0.55"/>
    <circle cx="100" cy="100" r="84.5" fill="none" stroke="var(--accent-dark, #7a5e2e)" stroke-width="0.6" opacity="0.55"/>
  </g>

  <g filter="url(#embossAuto)">
    <text x="74" y="155"
          font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif"
          font-weight="700" font-size="195"
          fill="url(#cGAuto)"
          text-anchor="middle">C</text>
  </g>

  <g filter="url(#embossAuto)">
    <text x="125" y="143"
          font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif"
          font-weight="700" font-size="118"
          fill="url(#fourGAuto)"
          text-anchor="middle">4</text>
  </g>
</svg>
