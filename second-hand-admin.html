<!doctype html><html lang="en-IN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second-Hand Item Manager | Call4All</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/properties.css"><link rel="stylesheet" href="assets/css/marketplace.css"></head><body style="background:#f3f6f4"><header class="pa-top"><div><strong>♻️ Second-Hand Manager</strong><div style="font-size:12px;opacity:.8"><span id="managerRole">User</span> inventory panel</div></div><div><a class="btn btn-outline btn-sm" href="second-hand-items.html" target="_blank" style="color:#fff;border-color:#fff">View Listings</a> <a class="btn btn-outline btn-sm" id="backPanel" href="admin.html" style="color:#fff;border-color:#fff">Back</a></div></header>
<main class="pa-wrap"><div class="pa-grid"><section class="pa-card"><h2 id="formTitle">Add Second-Hand Item</h2><p class="market-admin-note">Admin items direct publish honge. Staff items admin approval ke baad public honge.</p><form class="pa-form" id="secondHandForm"><input type="hidden" name="image_path"><label>Category *</label><select name="category" required><option value="">Select category</option><option>Furniture</option><option>Electronics</option><option>Home Appliance</option><option>Mobile & Computer</option><option>Vehicle</option><option>Tools & Machinery</option><option>Other</option></select><label>Item title *</label><input name="title" required placeholder="e.g. Wooden Double Bed"><div class="pa-row"><div><label>Brand</label><input name="brand" placeholder="Brand / maker"></div><div><label>Condition *</label><select name="condition" required><option>Like New</option><option>Good</option><option>Fair</option><option>Needs Repair</option></select></div></div><label>Price (₹) *</label><input name="price" required type="number" min="0" placeholder="5000"><div class="pa-row"><div><label>City *</label><input name="city" required value="Jaipur"></div><div><label>Area *</label><input name="area" required placeholder="Kukas"></div></div><label>Contact number *</label><input name="contact_phone" required type="tel" inputmode="tel" pattern="[0-9+() -]{7,15}" maxlength="15"><label>Item image *</label><input id="secondHandImage" type="file" accept="image/png,image/jpeg,image/webp"><label>Description</label><textarea name="description" rows="5" placeholder="Age, features, defects, pickup details…"></textarea><div id="saveStatus" style="margin-top:10px"></div><div class="pa-actions"><button class="pa-btn gold" type="submit">Save Item</button><button class="pa-btn" id="cancelEdit" type="button" hidden>Cancel</button></div></form></section><section class="pa-card"><h2>Saved Items</h2><div id="secondHandAdminList"><p>Loading…</p></div></section></div></main><script src="assets/js/site.js"></script><script src="assets/js/booking.js"></script><script src="assets/js/second-hand-admin.js"></script></body></html>
