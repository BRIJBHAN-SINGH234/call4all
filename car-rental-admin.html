<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rental Car Manager | Call4All</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/properties.css">
<style>.cr-types{border:1px solid #dce3df;border-radius:10px;padding:12px;max-height:260px;overflow:auto}.cr-group{margin-bottom:12px}.cr-group strong{display:block;color:var(--primary);margin-bottom:6px}.cr-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:5px}.cr-options label{font-size:13px;display:flex;align-items:center;gap:6px}.cr-options input{width:auto}.cr-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.cr-toolbar>*{flex:1;min-width:170px}.cr-item{display:grid;grid-template-columns:150px 1fr auto;gap:14px;padding:14px 0;border-bottom:1px solid #e5e9e7}.cr-item img{width:150px;height:100px;object-fit:cover;border-radius:9px}.cr-pill{display:inline-block;padding:2px 7px;margin:2px;background:#edf4ff;border-radius:12px;font-size:11px}@media(max-width:720px){.pa-grid{grid-template-columns:1fr}.cr-item{grid-template-columns:1fr}.cr-item img{width:100%;height:190px}}</style></head>
<body style="background:#f3f6f4"><header class="pa-top"><div><strong id="heading">🚗 Rental Car Manager</strong><div style="font-size:12px;opacity:.75">Admin &amp; staff fleet inventory</div></div><div><a id="backLink" class="btn btn-outline btn-sm" href="admin.html" style="color:#fff;border-color:#fff">Dashboard</a> <a class="btn btn-outline btn-sm" href="rental-cars.html" target="_blank" style="color:#fff;border-color:#fff">Public Page</a></div></header>
<main class="pa-wrap"><div class="pa-grid"><section class="pa-card"><h2 id="formTitle">Add Rental Car</h2><form class="pa-form" id="carForm"><input type="hidden" name="id"><input type="hidden" name="image_path">
<div class="pa-row"><div><label>Car brand *</label><input name="brand" required placeholder="Toyota"></div><div><label>Model *</label><input name="model" required placeholder="Innova Crysta"></div></div>
<label>Car image *</label><input id="carImage" type="file" accept="image/png,image/jpeg,image/webp"><small id="currentImage"></small>
<label>Rental service types * <small>(multiple select)</small></label><div class="cr-types" id="typeChoices">Loading…</div>
<div class="pa-row"><div><label>Starting price / rate</label><input name="price" placeholder="₹2,500/day or Ask for price"></div><div><label>City</label><input name="city" value="Jaipur"></div></div>
<div class="pa-row"><div><label>Seats</label><input name="seats" type="number" min="1" max="60"></div><div><label>Fuel</label><select name="fuel"><option>Petrol</option><option>Diesel</option><option>CNG</option><option>Electric</option><option>Hybrid</option></select></div></div>
<label>Transmission</label><select name="transmission"><option>Manual</option><option>Automatic</option></select><label>Description</label><textarea name="description" rows="3" placeholder="Features, condition, driver details…"></textarea><label>Status</label><select name="status"><option>Active</option><option>Inactive</option></select><div id="saveStatus"></div><div class="pa-actions"><button class="pa-btn gold" type="submit">Save Car</button><button class="pa-btn" id="cancelEdit" type="button" hidden>Cancel</button></div></form></section>
<section class="pa-card"><h2>Rental Car Inventory</h2><div class="cr-toolbar"><input id="search" type="search" placeholder="Search brand, model, service…"><select id="typeFilter"><option value="">All services</option></select></div><div id="carList">Loading…</div></section></div></main>
<script src="assets/js/site.js"></script><script src="assets/js/booking.js"></script><script src="assets/js/car-rental-admin.js"></script></body></html>
